sonar.projectKey=bankease-reactnative-merchant
sonar.projectName=BankEase Merchant Dashboard
sonar.projectVersion=1.0.0

# Sources
sonar.sources=.
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx

sonar.exclusions=\
  **/node_modules/**,\
  **/android/**,\
  **/ios/**,\
  **/.expo/**,\
  **/coverage/**,\
  **/dist/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/e2e/**,\
  **/modules/**,\
  **/mocks/**,\
  **/.git/**

# Use standalone tsconfig (expo/tsconfig.base is in node_modules which is excluded)
sonar.typescript.tsconfigPath=tsconfig.sonar.json

# Skip npm audit / dependency scanning (speeds up scan)
sonar.dependencyCheck.skip=true

# Test files
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.tests=.

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
